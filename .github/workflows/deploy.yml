name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one concurrent deploy, skipping in-flight runs if a newer push arrives.
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Guard against shipping bracket-style placeholders like "[학과명]"
      # or "[프로젝트…]" into production. The pattern excludes Astro's
      # own rest-param syntax `[...slug]` so dynamic-route filenames
      # don't trip the check. Cheap, runs offline, fails the deploy
      # *before* a half-filled draft can leak.
      - name: Check for unfilled placeholders
        run: |
          if grep -RnE '\[[^]]{2,}\]' src/pages src/components src/layouts \
              --include='*.astro' --include='*.md' \
              | grep -vE '\[\.\.\.[a-zA-Z_]+\]' ; then
            echo "::error::Unfilled [bracket] placeholders found above. Fix them before deploying."
            exit 1
          fi

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
