# -----------------------------------------------------------------------------
# Hanbin Oh — personal site
# Theme: Minimal Mistakes, pulled via remote_theme so GitHub Pages builds
#        natively (no GitHub Actions, no gh-pages branch drama).
# -----------------------------------------------------------------------------

# --- Site basics -------------------------------------------------------------
title: "Hanbin Oh"
subtitle: "Notes on diffusion models and robotics"
name: &name "Hanbin Oh"
email: hanbinftr55@gmail.com
description: >
  Personal site of Hanbin Oh — undergraduate student at Chung-Ang University.
  Notes, project write-ups, and (eventually) papers on diffusion models and robotics.
url: "https://hanbin5.github.io"
baseurl: ""
repository: "hanbin5/hanbin5.github.io"

# --- Theme -------------------------------------------------------------------
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "contrast"   # options: default, air, aqua, contrast, dark, dirt, mint, neon, plum, sunrise
search: false

# --- Author sidebar ----------------------------------------------------------
author:
  name   : *name
  avatar : "/assets/images/prof_pic.jpg"
  bio    : "Undergraduate, CSE @ Chung-Ang University · Diffusion & Robotics"
  location: "Seoul, Republic of Korea"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:hanbinftr55@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hanbin5"
    # - label: "Google Scholar"        # 첫 논문 이후 주석 해제
    #   icon: "fas fa-fw fa-graduation-cap"
    #   url: "https://scholar.google.com/citations?user=XXXXXXXX"

# --- Footer ------------------------------------------------------------------
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hanbin5"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:hanbinftr55@gmail.com"

# --- Plugins (all whitelisted for native GitHub Pages build) -----------------
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

# --- Build options -----------------------------------------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
permalink: /posts/:year/:month/:day/:title/
timezone: Asia/Seoul

include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - DEPLOY.md
  - README.md
  - .sass-cache
  - .jekyll-cache
  - node_modules

# --- Pagination (homepage post list) -----------------------------------------
paginate: 5
paginate_path: /page:num/

# --- Reading experience defaults ---------------------------------------------
defaults:
  # Blog posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
      toc: true
      toc_sticky: true
      show_date: true

  # Static pages under _pages/
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
